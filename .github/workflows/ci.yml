name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  control-plane:
    name: Control Plane (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: control-plane/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff / pyflakes)
        run: ruff check .

      - name: Tests
        run: python -m pytest -q
